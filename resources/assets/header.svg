    <line x1="0" y1="150" x2="1200" y2="150" /><line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="100" y1="0" x2="100" y2="300" /><line x1="300" y1="0" x2="300" y2="300" />
    <line x1="500" y1="0" x2="500" y2="300" /><line x1="700" y1="0" x2="700" y2="300" />
    <line x1="900" y1="0" x2="900" y2="300" /><line x1="1100" y1="0" x2="1100" y2="300" />
  </g>
  <circle cx="80" cy="100" r="6" fill="#a3e635" opacity="0.6" filter="url(#glow)" />
  <circle cx="140" cy="160" r="4" fill="#a6e7ff" opacity="0.5" filter="url(#glow)" />
  <circle cx="200" cy="120" r="5" fill="#a855f7" opacity="0.5" filter="url(#glow)" />
  <line x1="80" y1="100" x2="140" y2="160" stroke="#a3e635" stroke-width="1" opacity="0.25" />
  <line x1="140" y1="160" x2="200" y2="120" stroke="#a855f7" stroke-width="1" opacity="0.25" />
  <circle cx="1120" cy="100" r="6" fill="#bfffa6" opacity="0.6" filter="url(#glow)" />
  <circle cx="1060" cy="160" r="4" fill="#ffb1de" opacity="0.5" filter="url(#glow)" />
  <circle cx="1000" cy="120" r="5" fill="#a6e7ff" opacity="0.5" filter="url(#glow)" />
  <rect x="980" y="55" width="130" height="90" rx="12" fill="#151924" stroke="url(#rgb-border)" stroke-width="1.5" opacity="0.9" />
  <path d="M1005 85 H1085 M1005 105 H1065 M1005 125 H1045" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" opacity="0.85" />
