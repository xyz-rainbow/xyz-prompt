<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="header-title">
  <title id="header-title">xyz-prompt — Prompt Rating SPA</title>
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb1de" />
      <stop offset="50%" stop-color="#a6e7ff" />
      <stop offset="100%" stop-color="#bfffa6" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="100%" stop-color="#141622" />
    </linearGradient>
    <linearGradient id="rgb-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635" />
      <stop offset="50%" stop-color="#a6e7ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg-grad)" rx="15" />

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50" />
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
    <line x1="500" y1="0" x2="500" y2="300" />
    <line x1="700" y1="0" x2="700" y2="300" />
    <line x1="900" y1="0" x2="900" y2="300" />
    <line x1="1100" y1="0" x2="1100" y2="300" />
  </g>

  <g opacity="0.55" filter="url(#glow)">
    <circle cx="80" cy="100" r="6" fill="#a3e635" />
    <circle cx="140" cy="160" r="4" fill="#a6e7ff" />
    <circle cx="200" cy="120" r="5" fill="#a855f7" />
    <line x1="80" y1="100" x2="140" y2="160" stroke="#a3e635" stroke-width="1" opacity="0.35" />
    <line x1="140" y1="160" x2="200" y2="120" stroke="#a855f7" stroke-width="1" opacity="0.35" />
  </g>

  <g transform="translate(980, 55)" opacity="0.9">
    <rect width="130" height="90" rx="12" fill="#151924" stroke="url(#rgb-border)" stroke-width="1.5" />
    <path d="M25 30 H105 M25 50 H85 M25 70 H65" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" opacity="0.85" />
    <circle cx="115" cy="70" r="7" fill="#a855f7" filter="url(#glow)" />
  </g>

  <g transform="translate(600, 118)" text-anchor="middle">
    <text
      y="0"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="64"
      font-weight="900"
      fill="url(#cyber-grad)"
      letter-spacing="4"
      filter="url(#glow)"
    >xyz-prompt</text>
    <text
      y="42"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="17"
      font-weight="600"
      fill="#a6e7ff"
      letter-spacing="2"
      opacity="0.95"
    >Rate, compare, and analyze system prompts</text>
    <text
      y="72"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="11"
      font-weight="400"
      fill="#ffffff"
      letter-spacing="1.5"
      opacity="0.5"
    >Pages · Versus A/B · Metrics Grid · IndexedDB · i18n ES/EN</text>
  </g>

  <text
    x="600"
    y="285"
    font-family="ui-monospace, Consolas, monospace"
    font-size="10"
    fill="#bfffa6"
    text-anchor="middle"
    opacity="0.5"
  >xyz-rainbow · rainbowtechnology.xyz</text>
</svg>
