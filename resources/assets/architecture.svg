<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" role="img" aria-labelledby="arch-title">
  <title id="arch-title">xyz-prompt system architecture</title>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1017" />
      <stop offset="100%" stop-color="#181b28" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3045" />
      <stop offset="100%" stop-color="#1d2230" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrow-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ffb1de" />
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a6e7ff" />
    </marker>
    <marker id="arrow-lime" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#bfffa6" />
    </marker>
  </defs>

  <rect width="1000" height="540" fill="url(#bg-grad)" rx="15" />

  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80" x2="1000" y2="80" />
    <line x1="0" y1="160" x2="1000" y2="160" />
    <line x1="200" y1="0" x2="200" y2="540" />
    <line x1="500" y1="0" x2="500" y2="540" />
    <line x1="800" y1="0" x2="800" y2="540" />
  </g>

  <text
    x="500"
    y="40"
    font-family="Segoe UI, system-ui, sans-serif"
    font-size="16"
    font-weight="700"
    fill="#a6e7ff"
    text-anchor="middle"
    letter-spacing="1.5"
    filter="url(#glow)"
  >xyz-prompt — System Architecture</text>

  <!-- Row 1: data flow -->
  <g transform="translate(16, 72)">
    <rect width="196" height="196" rx="10" fill="url(#card-grad)" stroke="#ffb1de" stroke-width="2" />
    <rect width="196" height="40" rx="10" fill="#202538" />
    <text x="14" y="27" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffb1de">INGESTION</text>
    <rect x="12" y="54" width="172" height="30" rx="5" fill="#151924" stroke="#ffb1de" stroke-width="0.5" />
    <text x="24" y="73" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">File upload (.md .txt .json)</text>
    <rect x="12" y="92" width="172" height="30" rx="5" fill="#151924" stroke="#a6e7ff" stroke-width="0.5" />
    <text x="24" y="111" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">Clipboard paste</text>
    <rect x="12" y="130" width="172" height="30" rx="5" fill="#151924" stroke="#bfffa6" stroke-width="0.5" />
    <text x="24" y="149" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">.docx / .pdf parser</text>
    <text x="98" y="180" font-family="ui-monospace, Consolas, monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.45">fileParser.ts</text>
  </g>

  <path d="M222 170 L248 170" fill="none" stroke="#ffb1de" stroke-width="2" marker-end="url(#arrow-pink)" />

  <g transform="translate(258, 62)">
    <rect width="186" height="206" rx="10" fill="url(#card-grad)" stroke="#a6e7ff" stroke-width="2" />
    <rect width="186" height="40" rx="10" fill="#202538" />
    <text x="14" y="27" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a6e7ff">ZUSTAND</text>
    <rect x="12" y="54" width="162" height="28" rx="5" fill="#151924" stroke="#ffffff" stroke-width="0.5" />
    <text x="24" y="72" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">Mode: Pages / Versus</text>
    <rect x="12" y="90" width="162" height="28" rx="5" fill="#151924" stroke="#ffffff" stroke-width="0.5" />
    <text x="24" y="108" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">i18n ES / EN store</text>
    <rect x="12" y="126" width="162" height="28" rx="5" fill="#151924" stroke="#ffffff" stroke-width="0.5" />
    <text x="24" y="144" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">Chat + vote state</text>
    <rect x="12" y="162" width="162" height="28" rx="5" fill="#282d3f" />
    <text x="93" y="180" font-family="ui-monospace, Consolas, monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.55">useStore.ts</text>
  </g>

  <path d="M454 170 L480 170" fill="none" stroke="#a6e7ff" stroke-width="2" marker-end="url(#arrow-cyan)" />

  <g transform="translate(490, 62)">
    <rect width="196" height="206" rx="10" fill="url(#card-grad)" stroke="#a3e635" stroke-width="2" />
    <rect width="196" height="40" rx="10" fill="#202538" />
    <text x="14" y="27" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a3e635">DEXIE INDEXEDDB</text>
    <rect x="12" y="54" width="172" height="28" rx="5" fill="#151924" stroke="#a3e635" stroke-width="0.5" />
    <text x="24" y="72" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">prompts / votes</text>
    <rect x="12" y="90" width="172" height="28" rx="5" fill="#151924" stroke="#a3e635" stroke-width="0.5" />
    <text x="24" y="108" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">feedbacks</text>
    <rect x="12" y="126" width="172" height="28" rx="5" fill="#151924" stroke="#a855f7" stroke-width="0.5" />
    <text x="24" y="144" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">providers + aiSettings</text>
    <rect x="12" y="162" width="172" height="28" rx="5" fill="#282d3f" />
    <text x="98" y="180" font-family="ui-monospace, Consolas, monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.55">schema.ts</text>
  </g>

  <path d="M696 170 L722 170" fill="none" stroke="#bfffa6" stroke-width="2" marker-end="url(#arrow-lime)" />

  <g transform="translate(732, 62)">
    <rect width="252" height="206" rx="10" fill="url(#card-grad)" stroke="#a855f7" stroke-width="2" />
    <rect width="252" height="40" rx="10" fill="#202538" />
    <text x="14" y="27" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a855f7">AI LAYER</text>
    <rect x="12" y="54" width="228" height="28" rx="5" fill="#151924" stroke="#a855f7" stroke-width="0.5" />
    <text x="24" y="72" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">Mock responses (default)</text>
    <rect x="12" y="90" width="228" height="28" rx="5" fill="#151924" stroke="#a6e7ff" stroke-width="0.5" />
    <text x="24" y="108" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">OpenAI-compatible APIs</text>
    <rect x="12" y="126" width="228" height="28" rx="5" fill="#151924" stroke="#bfffa6" stroke-width="0.5" />
    <text x="24" y="144" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">Ollama / LM Studio / local</text>
    <rect x="12" y="162" width="228" height="28" rx="5" fill="#282d3f" />
    <text x="126" y="180" font-family="ui-monospace, Consolas, monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.55">aiService.ts · providerApi.ts</text>
  </g>

  <path d="M500 278 L500 302" fill="none" stroke="#bfffa6" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.55" />

  <!-- Row 2: UI -->
  <g transform="translate(40, 312)">
    <rect width="920" height="178" rx="10" fill="url(#card-grad)" stroke="#a6e7ff" stroke-width="1.5" />
    <text
      x="460"
      y="30"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="13"
      font-weight="700"
      fill="#a6e7ff"
      text-anchor="middle"
      letter-spacing="1"
    >React UI — ChatShell + Views</text>

    <g transform="translate(24, 48)">
      <rect width="270" height="104" rx="8" fill="#151924" stroke="#a3e635" stroke-width="1" />
      <text x="135" y="30" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a3e635" text-anchor="middle">PAGES</text>
      <text x="135" y="54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.75">Paginated prompt review</text>
      <text x="135" y="74" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.75">Vote, feedback, and chat test</text>
    </g>

    <g transform="translate(325, 48)">
      <rect width="270" height="104" rx="8" fill="#151924" stroke="#a855f7" stroke-width="1" />
      <text x="135" y="30" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#a855f7" text-anchor="middle">VERSUS A/B</text>
      <text x="135" y="54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.75">Random pair comparison</text>
      <text x="135" y="74" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.75">Side-by-side outputs</text>
    </g>

    <g transform="translate(626, 48)">
      <rect width="270" height="104" rx="8" fill="#151924" stroke="#ffb1de" stroke-width="1" />
      <text x="135" y="30" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffb1de" text-anchor="middle">METRICS GRID</text>
      <text x="135" y="54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.75">3×3 hover preview</text>
      <text x="135" y="74" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.75">AI-assisted feedback</text>
    </g>
  </g>

  <text
    x="500"
    y="528"
    font-family="ui-monospace, Consolas, monospace"
    font-size="10"
    fill="#bfffa6"
    text-anchor="middle"
    opacity="0.5"
  >xyz-rainbow · rainbowtechnology.xyz</text>
</svg>
